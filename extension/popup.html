<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Toxicity Detector</title>
  <style>
    body { font-family: Arial, sans-serif; width: 300px; padding: 10px; }
    #result { margin-top: 10px; font-weight: bold; }
    #loading { color: grey; }
  </style>
</head>
<body>
  <h3>Toxicity Detector</h3>
  <div>
    <textarea id="inputText" rows="4" style="width: 100%;" readonly></textarea>

  <div id="loading" style="display:none;">Checking...</div>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
